name: Deploy Vite to Vercel

on:
  push:
    branches:
      - main

permissions:
  contents: write # <--- this gives commit/push rights

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Nuthanan Tharmarajah"
          git config user.email "nuthanan06@gmail.com"

      - name: Make dummy commit as Nuthanan
        run: |
          echo "Last deploy: $(date)" > .last_deploy.txt
          git add .last_deploy.txt
          git commit -m "chore: trigger deploy as Nuthanan" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
